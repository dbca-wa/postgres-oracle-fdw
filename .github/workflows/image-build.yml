name: 'Build Docker image'

on:
  schedule:
    # 0511 AWST, Sunday
    - cron: '11 21 * * 0'
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker metadata default
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          annotations: |
            type=org.opencontainers.image.description,value=${{ github.event.repository.description || 'No description provided' }}
          # Image tags
          # latest → default branch (main)
          # Semantic versions from Git tags (v1.2.3)
          # Always add commit SHA
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,event=branch,branch=dev
            type=semver,pattern={{version}}
            type=sha

      - name: Set up Docker context for Buildx
        id: buildx-context
        run: |
          docker context create builders
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        env:
          DOCKER_BUILDKIT: 1
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
